name: Update English Immersion Feeds

on:
  schedule:
    # Chạy vào lúc 00:00 UTC mỗi ngày (tương đương 07:00 sáng giờ VN)
    - cron: '0 0 * * *'
  workflow_dispatch: # Cho phép bạn bấm nút chạy thủ công bất cứ lúc nào

permissions:
  contents: write # Cấp quyền cho robot ghi file data.json vào kho code của bạn

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run update script
        run: python update_feeds.py

      - name: Commit and push if data changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update feeds: $(date)" && git push)
