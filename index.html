<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngâm ngaa - Bunchaway</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --glass-bg: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #c084fc;
        }

        body {
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, var(--bg) 70%);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        header h1 { 
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -1px;
        }
        header p { color: var(--text-muted); font-size: 1.1rem; }

        .nav-wrapper {
            position: sticky;
            top: 20px;
            z-index: 1000;
            margin-bottom: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            padding: 10px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .filter-row {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter-group {
            display: flex;
            gap: 6px;
            padding: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            flex-shrink: 0;
        }


        .group-divider {
            width: 1px;
            height: 20px;
            background: var(--glass-border);
            margin: 0 5px;
        }

        #sub-tabs-container {
            display: flex;
        }

        .sub-tabs {
            display: none;
            gap: 6px;
        }
        .sub-tabs.active { display: flex; }

        button {
            padding: 6px 14px;
            border: 1px solid transparent;
            border-radius: 12px;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-muted);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
        }

        button:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.05);
        }

        button.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
        }

        /* Type buttons slightly emphasized */
        .type-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--accent));
        }

        #newsfeed {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px;
            animation: fadeIn 1s ease-out;
        }

        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(30, 41, 59, 1);
            border-color: var(--primary-light);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
        }

        .card-img-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
            background: #1e293b;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .card-img {
            transform: scale(1.05);
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            margin-bottom: 10px;
            color: var(--text-muted);
        }

        .badge {
            padding: 3px 8px;
            border-radius: 6px;
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary-light);
            font-weight: 700;
            font-size: 0.65rem;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
            max-width: 150px;
        }

        .card-title {
            margin: 0 0 10px 0;
            font-size: 1.05rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex-grow: 1;
            font-weight: 600;
            line-clamp: 3;
        }


        .card-title a {
            color: var(--text);
            text-decoration: none;
            transition: color 0.2s;
        }

        .card-title a:hover {
            color: var(--primary-light);
        }

        .card-footer {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 800px) {
            .group-divider { display: none; }
            .filter-row { gap: 8px; }
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .nav-wrapper { border-radius: 0; position: relative; top: 0; margin-bottom: 30px; margin-left: -10px; margin-right: -10px; width: auto; }
            header h1 { font-size: 2rem; }
            .filter-row { justify-content: flex-start; overflow-x: auto; padding-bottom: 5px; flex-wrap: nowrap; }
            .filter-row::-webkit-scrollbar { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Ngâm ngaa</h1>
        <p>Chọn con đường học tập và đắm mình vào Tiếng Anh</p>
    </header>

    <div class="nav-wrapper">
        <div class="filter-row">
            <!-- Group 1: User Type -->
            <div class="filter-group type-tabs">
                <button class="type-btn active" data-type="learner">🧑‍🎓 Learner</button>
                <button class="type-btn" data-type="native">🌎 Native</button>
            </div>

            <div class="group-divider"></div>

            <!-- Group 2: Categories -->
            <div class="filter-group cat-tabs">
                <button class="cat-btn active" data-cat="listening">🎧 Listening</button>
                <button class="cat-btn" data-cat="reading">📖 Reading</button>
            </div>

            <div class="group-divider sub-divider"></div>

            <!-- Group 3: Sub-tabs (Conditional) -->
            <div id="sub-tabs-container">
                <div id="sub-listening" class="filter-group sub-tabs active">
                    <button class="sub-btn active" data-sub="youtube">📺 Youtube</button>
                    <button class="sub-btn" data-sub="podcast">🎙️ Podcast</button>
                </div>
                <div id="sub-reading" class="filter-group sub-tabs">
                    <button class="sub-btn active" data-sub="other">📰 Other</button>
                    <button class="sub-btn" data-sub="reddit">💬 Reddit</button>
                </div>
            </div>
        </div>
    </div>


    <div id="newsfeed">
        <div style="grid-column: 1 / -1; text-align:center; padding: 40px; color: var(--text-muted);">
            Đang tải dữ liệu...
        </div>
    </div>
</div>

<script>
    let allData = [];
    let currentType = 'learner';
    let currentCat = 'listening';
    let currentSub = 'youtube';

    // Xử lý dữ liệu
    async function loadFeeds() {
        try {
            const response = await fetch('./data.json?v=' + Date.now());
            if (!response.ok) throw new Error('Không tìm thấy file data.json');
            allData = await response.json();
            renderFeeds();
        } catch (error) {
            document.getElementById('newsfeed').innerHTML = `
                <div style="grid-column: 1 / -1; text-align:center; padding: 80px; color: var(--text-muted);">
                    <p style="font-size: 3rem; margin-bottom: 10px;">⚠️</p>
                    <p>${error.message}</p>
                    <p><small>Đảm bảo bạn đã chạy update_feeds.py</small></p>
                </div>`;
        }
    }

    function renderFeeds() {
        const container = document.getElementById('newsfeed');
        container.innerHTML = '';

        const filtered = allData.filter(item => 
            item.type === currentType && 
            item.category === currentCat && 
            item.sub === currentSub
        );

        if (filtered.length === 0) {
            container.innerHTML = `
                <div style="grid-column: 1 / -1; text-align:center; padding: 80px; color: var(--text-muted);">
                    <p style="font-size: 4rem; opacity: 0.2; margin-bottom: 20px;">📭</p>
                    <p>Hiện không tìm thấy nội dung mới của hôm nay & hôm qua.</p>
                </div>`;
            return;
        }

        filtered.forEach((item, index) => {
            const dateObj = new Date(item.date);
            const dateStr = dateObj.toLocaleDateString('vi-VN', {
                day: '2-digit', month: '2-digit'
            });
            
            const imgHtml = (item.thumbnail) 
                ? `<div class="card-img-wrapper"><img src="${item.thumbnail}" class="card-img" alt="thumbnail" loading="lazy" onerror="this.parentElement.style.display='none'"></div>` 
                : '';
            
            const card = document.createElement('article');
            card.className = 'card';
            card.style.animationDelay = (index * 0.05) + 's';
            card.innerHTML = `
                ${imgHtml}
                <div class="card-meta">
                    <span class="badge" title="${item.source}">${item.source}</span>
                </div>
                <h3 class="card-title">
                    <a href="${item.link}" target="_blank" rel="noopener noreferrer">${item.title}</a>
                </h3>
                <div class="card-footer">
                    <span>📅 ${dateStr}</span>
                    <span style="opacity: 0.5;">${item.sub.toUpperCase()}</span>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Các hàm chuyển đổi tab
    function updateTabs() {
        // Cập nhật Type buttons
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.type === currentType);
        });

        // Cập nhật Category buttons
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.cat === currentCat);
        });

        // Cập nhật Sub-tabs hiển thị
        document.querySelectorAll('.sub-tabs').forEach(group => {
            group.classList.toggle('active', group.id === `sub-${currentCat}`);
        });

        // Cập nhật Sub-buttons
        document.querySelectorAll('.sub-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.sub === currentSub);
        });

        renderFeeds();
    }

    // Gán sự kiện
    document.querySelectorAll('.type-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            currentType = e.currentTarget.dataset.type;
            updateTabs();
        });
    });

    document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            currentCat = e.currentTarget.dataset.cat;
            
            // Khi chuyển category, phải chọn lại sub mặc định theo yêu cầu
            // Listening -> Youtube, Reading -> Other
            if (currentCat === 'listening') {
                currentSub = 'youtube';
            } else {
                currentSub = 'other';
            }
            
            updateTabs();
        });
    });

    document.querySelectorAll('.sub-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            currentSub = e.currentTarget.dataset.sub;
            updateTabs();
        });
    });

    // Chạy khi tải trang
    loadFeeds();
</script>

</body>
</html>
